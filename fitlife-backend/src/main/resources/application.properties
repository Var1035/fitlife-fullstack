# Server
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/fitlife_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=FitLifeJWTSecretKey2024VeryLongSecretKeyForHS256AlgorithmMustBeAtLeast256Bits
jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:4200
